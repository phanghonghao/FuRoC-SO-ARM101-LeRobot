<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L10,5 L0,9z" fill="#64748b"/></marker>
    <marker id="am2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L10,5 L0,9z" fill="#94a3b8"/></marker>
    <linearGradient id="gmain" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="gm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="gs" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="gss" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="ge" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".1"/></filter>
  </defs>

  <rect width="860" height="420" rx="12" fill="#f8fafc"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Module Dependency Graph</text>

  <!-- Main Controller (center top) -->
  <rect x="280" y="50" width="300" height="70" rx="12" fill="url(#gmain)" filter="url(#sh)"/>
  <text x="430" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">arm101_orchestrator.py</text>
  <text x="430" y="93" text-anchor="middle" font-size="10" fill="#fecaca">Main Controller + CLI Entry Point</text>
  <text x="430" y="108" text-anchor="middle" font-size="9" fill="#fecaca">2-level event loop: dispatch → monitor → advance</text>

  <!-- PhaseManager -->
  <rect x="30" y="175" width="180" height="65" rx="10" fill="url(#gm)" filter="url(#sh)"/>
  <text x="120" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">phase_manager.py</text>
  <text x="120" y="216" text-anchor="middle" font-size="9" fill="#dbeafe">YAML parse + 3-layer merge</text>
  <text x="120" y="229" text-anchor="middle" font-size="9" fill="#dbeafe">PhaseConfig dataclass</text>
  <line x1="120" y1="175" x2="340" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#am)"/>

  <!-- StateStore -->
  <rect x="230" y="175" width="180" height="65" rx="10" fill="url(#gs)" filter="url(#sh)"/>
  <text x="320" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">state_store.py</text>
  <text x="320" y="216" text-anchor="middle" font-size="9" fill="#ede9fe">Atomic JSON persistence</text>
  <text x="320" y="229" text-anchor="middle" font-size="9" fill="#ede9fe">OrchestratorState</text>
  <line x1="370" y1="175" x2="410" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#am)"/>

  <!-- DataCollector -->
  <rect x="430" y="175" width="180" height="65" rx="10" fill="url(#gd)" filter="url(#sh)"/>
  <text x="520" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">data_collector.py</text>
  <text x="520" y="216" text-anchor="middle" font-size="9" fill="#fef3c7">MuJoCo scripted demos</text>
  <text x="520" y="229" text-anchor="middle" font-size="9" fill="#fef3c7">→ LeRobotDataset + HF Hub</text>
  <line x1="490" y1="175" x2="450" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#am)"/>

  <!-- TrainingLauncher -->
  <rect x="630" y="175" width="200" height="65" rx="10" fill="url(#gss)" filter="url(#sh)"/>
  <text x="730" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">training_launcher.py</text>
  <text x="730" y="216" text-anchor="middle" font-size="9" fill="#d1fae5">lerobot-train subprocess</text>
  <text x="730" y="229" text-anchor="middle" font-size="9" fill="#d1fae5">sys.argv + env vars</text>
  <line x1="680" y1="175" x2="530" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#am)"/>

  <!-- LossMonitor (child of TrainingLauncher) -->
  <rect x="635" y="290" width="190" height="55" rx="8" fill="#fff" stroke="#059669" stroke-width="1.5" filter="url(#sh)"/>
  <text x="730" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">loss_monitor.py</text>
  <text x="730" y="328" text-anchor="middle" font-size="9" fill="#64748b">Regex log parser + overfitting</text>
  <line x1="730" y1="290" x2="730" y2="240" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#am)"/>
  <text x="758" y="268" font-size="8" fill="#94a3b8">embedded</text>

  <!-- EvalRunner -->
  <rect x="30" y="290" width="180" height="55" rx="8" fill="url(#ge)" filter="url(#sh)"/>
  <text x="120" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">eval_runner.py</text>
  <text x="120" y="328" text-anchor="middle" font-size="9" fill="#cffafe">ACT + MuJoCo rollout</text>
  <line x1="180" y1="290" x2="370" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#am2)"/>

  <!-- External dependencies (right side) -->
  <rect x="20" y="375" width="120" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="80" y="395" text-anchor="middle" font-size="10" fill="#64748b">MuJoCo 3.8</text>

  <rect x="155" y="375" width="120" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="215" y="395" text-anchor="middle" font-size="10" fill="#64748b">LeRobot 0.5.1</text>

  <rect x="290" y="375" width="120" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="350" y="395" text-anchor="middle" font-size="10" fill="#64748b">PyTorch</text>

  <rect x="425" y="375" width="120" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="485" y="395" text-anchor="middle" font-size="10" fill="#64748b">HF Hub</text>

  <text x="710" y="395" text-anchor="middle" font-size="9" fill="#94a3b8">External Dependencies</text>

  <!-- Legend -->
  <line x1="620" y1="380" x2="660" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="670" y="384" font-size="9" fill="#64748b">imports</text>
  <line x1="620" y1="398" x2="660" y2="398" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#am2)"/>
  <text x="670" y="402" font-size="9" fill="#64748b">embedded / uses</text>
</svg>
