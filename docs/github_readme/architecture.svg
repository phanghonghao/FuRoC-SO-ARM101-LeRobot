<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#64748b"/></marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".1"/></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">SO-ARM101 LeRobot — No-Hardware Simulation Training Pipeline</text>

  <!-- Layer 1: Simulation -->
  <rect x="30" y="55" width="200" height="130" rx="10" fill="url(#g1)" filter="url(#sh)"/>
  <text x="130" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Simulation</text>
  <line x1="50" y1="90" x2="210" y2="90" stroke="#ffffff40" stroke-width="1"/>
  <text x="50" y="110" font-size="11" fill="#dbeafe">MuJoCo 3.8 + SO-101 MJCF</text>
  <text x="50" y="128" font-size="11" fill="#dbeafe">scripts/data/collect_sim_data.py</text>
  <text x="50" y="146" font-size="11" fill="#dbeafe">scripts/sim/sim_viewer.py</text>
  <text x="50" y="164" font-size="11" fill="#dbeafe">Offscreen rendering (EGL)</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="120" x2="270" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">LeRobot</text>
  <text x="250" y="135" text-anchor="middle" font-size="9" fill="#94a3b8">Dataset</text>

  <!-- Layer 2: Dataset -->
  <rect x="270" y="55" width="200" height="130" rx="10" fill="url(#g2)" filter="url(#sh)"/>
  <text x="370" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Dataset</text>
  <line x1="290" y1="90" x2="450" y2="90" stroke="#ffffff40" stroke-width="1"/>
  <text x="290" y="110" font-size="11" fill="#ede9fe">LeRobot v3.0 format</text>
  <text x="290" y="128" font-size="11" fill="#ede9fe">video (torchcodec)</text>
  <text x="290" y="146" font-size="11" fill="#ede9fe">state + action parquet</text>
  <text x="290" y="164" font-size="11" fill="#ede9fe">10 eps / 800 frames</text>

  <!-- Arrow 2→3 -->
  <line x1="470" y1="120" x2="510" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">HF Hub</text>
  <text x="490" y="135" text-anchor="middle" font-size="9" fill="#94a3b8">Sync</text>

  <!-- Layer 3: Training -->
  <rect x="510" y="55" width="200" height="130" rx="10" fill="url(#g3)" filter="url(#sh)"/>
  <text x="610" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Training (RTX 6000D)</text>
  <line x1="530" y1="90" x2="690" y2="90" stroke="#ffffff40" stroke-width="1"/>
  <text x="530" y="110" font-size="11" fill="#fef3c7">ACT 84M — 1.9 step/s</text>
  <text x="530" y="128" font-size="11" fill="#fef3c7">Diffusion 263M — 13 step/s</text>
  <text x="530" y="146" font-size="11" fill="#fef3c7">torchcodec + AMP</text>
  <text x="530" y="164" font-size="11" fill="#fef3c7">orchestrator_arm101/</text>

  <!-- Arrow 3→4 -->
  <line x1="710" y1="120" x2="750" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="730" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">Save</text>
  <text x="730" y="135" text-anchor="middle" font-size="9" fill="#94a3b8">Ckpt</text>

  <!-- Layer 4: Evaluation -->
  <rect x="750" y="55" width="120" height="130" rx="10" fill="url(#g4)" filter="url(#sh)"/>
  <text x="810" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Eval</text>
  <line x1="765" y1="90" x2="855" y2="90" stroke="#ffffff40" stroke-width="1"/>
  <text x="765" y="110" font-size="11" fill="#d1fae5">MuJoCo</text>
  <text x="765" y="128" font-size="11" fill="#d1fae5">gym_pusht</text>
  <text x="765" y="146" font-size="11" fill="#d1fae5">Video + GIF</text>
  <text x="765" y="164" font-size="11" fill="#d1fae5">Metrics</text>

  <!-- Orchestrator bar -->
  <rect x="30" y="220" width="840" height="60" rx="10" fill="url(#g5)" filter="url(#sh)" opacity=".9"/>
  <text x="450" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Orchestrator Pipeline — YAML-driven automation with crash recovery &amp; overfitting detection</text>
  <text x="450" y="265" text-anchor="middle" font-size="11" fill="#fecaca">phase_manager · training_launcher · loss_monitor · eval_runner · state_store</text>

  <!-- Project Structure Section -->
  <rect x="30" y="310" width="410" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="235" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Project Structure</text>

  <text x="50" y="358" font-size="11" fill="#3b82f6" font-weight="600">scripts/</text>
  <text x="120" y="358" font-size="10" fill="#64748b">eval/  data/  sim/  monitoring/</text>
  <text x="50" y="378" font-size="11" fill="#8b5cf6" font-weight="600">outputs/</text>
  <text x="125" y="378" font-size="10" fill="#64748b">checkpoints/  eval_videos/  datasets/  logs/</text>
  <text x="50" y="398" font-size="11" fill="#f59e0b" font-weight="600">orchestrator_arm101/</text>
  <text x="210" y="398" font-size="10" fill="#64748b">8 modules, 67KB</text>
  <text x="50" y="418" font-size="11" fill="#10b981" font-weight="600">docs/</text>
  <text x="95" y="418" font-size="10" fill="#64748b">training/  deployment/  guides/</text>
  <text x="50" y="438" font-size="11" fill="#ef4444" font-weight="600">training_plans/</text>
  <text x="170" y="438" font-size="10" fill="#64748b">rtx_train_plan.yaml  so101_push_plan.yaml</text>

  <!-- Tech Stack Section -->
  <rect x="460" y="310" width="410" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="665" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Tech Stack</text>

  <rect x="480" y="350" width="85" height="28" rx="6" fill="#3b82f6"/><text x="522" y="369" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">MuJoCo</text>
  <rect x="575" y="350" width="75" height="28" rx="6" fill="#f97316"/><text x="612" y="369" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">PyTorch</text>
  <rect x="660" y="350" width="80" height="28" rx="6" fill="#8b5cf6"/><text x="700" y="369" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">LeRobot</text>
  <rect x="750" y="350" width="100" height="28" rx="6" fill="#10b981"/><text x="800" y="369" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">torchcodec</text>

  <!-- Policy cards -->
  <rect x="480" y="395" width="185" height="100" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="572" y="415" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">ACT (Transformer)</text>
  <text x="492" y="435" font-size="10" fill="#64748b">84M params · chunk_size=100</text>
  <text x="492" y="452" font-size="10" fill="#64748b">1.9 step/s · batch=128</text>
  <text x="492" y="469" font-size="10" fill="#64748b">SO-101 arm manipulation</text>
  <text x="492" y="486" font-size="10" fill="#10b981">Best: loss=0.1020 @40K</text>

  <rect x="675" y="395" width="185" height="100" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="767" y="415" text-anchor="middle" font-size="12" font-weight="600" fill="#8b5cf6">Diffusion (UNet)</text>
  <text x="687" y="435" font-size="10" fill="#64748b">263M params · chunk_size=1</text>
  <text x="687" y="452" font-size="10" fill="#64748b">13 step/s · batch=64</text>
  <text x="687" y="469" font-size="10" fill="#64748b">PushT 2D benchmark</text>
  <text x="687" y="486" font-size="10" fill="#f59e0b">Pretrained evaluated</text>
</svg>
