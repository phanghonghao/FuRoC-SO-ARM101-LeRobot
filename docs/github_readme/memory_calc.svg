<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 230" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".1"/></filter>
  </defs>

  <rect width="600" height="230" rx="12" fill="#f8fafc"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Why batch_size=128 is the Maximum</text>

  <!-- Formula -->
  <rect x="30" y="48" width="540" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="300" y="68" text-anchor="middle" font-size="12" fill="#475569">
    <tspan fill="#64748b">Memory ≈</tspan>
    <tspan fill="#f59e0b" font-weight="600"> batch_size</tspan>
    <tspan fill="#64748b"> × </tspan>
    <tspan fill="#3b82f6" font-weight="600">chunk_size²</tspan>
    <tspan fill="#64748b"> × </tspan>
    <tspan fill="#8b5cf6" font-weight="600">hidden_dim</tspan>
  </text>
  <text x="300" y="85" text-anchor="middle" font-size="12" fill="#475569">
    = <tspan font-weight="600">128</tspan> × <tspan font-weight="600">100²</tspan> × <tspan font-weight="600">512</tspan> ≈ <tspan font-weight="700" fill="#ef4444">79 GB</tspan>
    <tspan fill="#94a3b8"> (RTX 6000D single-GPU limit)</tspan>
  </text>

  <!-- Three cards -->
  <!-- batch=128 OK -->
  <rect x="30" y="110" width="170" height="70" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <text x="115" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">batch = 128</text>
  <text x="115" y="152" text-anchor="middle" font-size="11" fill="#64748b">~79 GB stable</text>
  <text x="115" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">OK</text>

  <!-- batch=256 OOM -->
  <rect x="215" y="110" width="170" height="70" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="300" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">batch = 256</text>
  <text x="300" y="152" text-anchor="middle" font-size="11" fill="#64748b">&gt; 79 GB</text>
  <text x="300" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">OOM</text>

  <!-- batch=512 OOM -->
  <rect x="400" y="110" width="170" height="70" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <text x="485" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">batch = 512</text>
  <text x="485" y="152" text-anchor="middle" font-size="11" fill="#64748b">18.75 GiB / alloc → OOM</text>
  <text x="485" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">OOM</text>

  <!-- Progress bar -->
  <rect x="30" y="198" width="540" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="30" y="198" width="265" height="14" rx="7" fill="#10b981" opacity=".8"/>
  <rect x="295" y="198" width="80" height="14" fill="#f59e0b" opacity=".6"/>
  <rect x="375" y="198" width="195" height="14" rx="0 7 7 0" fill="#ef4444" opacity=".6"/>
  <text x="165" y="209" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">128 — fits</text>
  <text x="470" y="209" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">256 / 512 — OOM</text>

  <text x="300" y="226" text-anchor="middle" font-size="9" fill="#94a3b8">VRAM: 0 GB ──────────────────────── 79 GB ─────────────────────────── 85.7 GB</text>
</svg>